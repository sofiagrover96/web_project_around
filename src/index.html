<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Página interactiva en la que los usuarios pueden eliminar, añadir o dar like a las fotos"
    />

    <meta name="author" content="Sofia Almeida" />

    <meta name="keywords" content="around, tripleten, HTML, CSS, javascript" />

    <title>Alrededor de los EE.UU.</title>

    <link rel="stylesheet" href="./pages/index.css" />
  </head>

  <body>
    <div class="page">
      <!-- HEADER -->

      <header class="header">
        <img
          src="./images/Vector (5).svg"
          alt="logo-page"
          class="header__image"
        />
      </header>

      <!-- MAIN -->

      <main class="main">
        <section class="main__profile">
          <div class="main__content-image">
            <img
              src="./images/image.jpg"
              alt="Jacques Cousteau"
              class="main__image"
            />
          </div>

          <div class="main__content-paragraph">
            <p class="main__paragraph main__paragraph-title">
              Jacques Cousteau
            </p>

            <p class="main__paragraph main__paragraph-subtitle">Explorador</p>

            <button
              type="button"
              class="main__button main__button_edit profile__edit-button"
            >
              ✎
            </button>
          </div>

          <button
            type="button"
            class="main__button main__button_add profile__add-button"
          >
            +
          </button>
        </section>

        <!-- GALERÍA -->

        <section class="main__gallery"></section>
      </main>

      <!-- FOOTER -->

      <footer class="footer">
        <p class="footer__copyright">© 2024 Around The U.S.</p>
      </footer>
    </div>

    <!-- POPUP EDIT PROFILE -->

    <div class="popup" id="edit-profile-popup">
      <div class="popup__container">
        <button type="button" class="popup__button popup__button_close">
          ×
        </button>

        <form class="form" name="edit-profile" novalidate>
          <h2 class="popup__subtitle">Editar perfil</h2>

          <fieldset class="popup__content">
            <input
              type="text"
              id="profile-name"
              name="name"
              class="popup__input form__input popup__input_name"
              placeholder="Nombre"
              required
              minlength="2"
              maxlength="40"
            />

            <span class="form__input-error" id="profile-name-error"></span>

            <input
              type="text"
              id="profile-about"
              name="about"
              class="popup__input form__input popup__input_about"
              placeholder="Acerca de mí"
              required
              minlength="2"
              maxlength="200"
            />

            <span class="form__input-error" id="profile-about-error"></span>
          </fieldset>

          <button
            type="submit"
            class="popup__button popup__button_save form__save-button"
          >
            Guardar
          </button>
        </form>
      </div>
    </div>

    <!-- POPUP ADD CARD -->

    <div class="popup" id="add-place-popup">
      <div class="popup__container">
        <button type="button" class="popup__button popup__button_close">
          ×
        </button>

        <form class="form" id="add-place-form" novalidate>
          <h2 class="popup__subtitle">Nuevo lugar</h2>

          <fieldset class="popup__content">
            <input
              type="text"
              id="place-title"
              name="title"
              class="popup__input form__input popup__input_title"
              placeholder="Título"
              required
              minlength="2"
              maxlength="30"
            />

            <span class="form__input-error" id="place-title-error"></span>

            <input
              type="url"
              id="place-link"
              name="imageURL"
              class="popup__input form__input popup__input_imageURL"
              placeholder="Image URL"
              required
            />

            <span class="form__input-error" id="place-link-error"></span>
          </fieldset>

          <button
            type="submit"
            class="popup__button popup__button_save form__save-button"
          >
            Guardar
          </button>
        </form>
      </div>
    </div>

    <!-- POPUP IMAGE -->

    <div class="popup" id="image-popup">
      <div class="popup__image-container">
        <button type="button" class="popup__button popup__button_close">
          ×
        </button>

        <img class="popup__image" src="" alt="" />

        <p class="popup__caption"></p>
      </div>
    </div>

    <!-- TEMPLATE -->

    <template id="card-template">
      <article class="main__gallery-card">
        <img class="main__gallery-image" src="#" alt="#" />

        <button class="main__delete-button" type="button">
          <img
            src="./images/trash.svg"
            alt="trash"
            class="main__gallery-trash"
          />
        </button>

        <div class="main__gallery-content">
          <p class="main__gallery-paragraph"></p>

          <button class="main__button-like" type="button">
            <img src="./images/Vector.svg" alt="like" class="main__like-icon" />
          </button>
        </div>
      </article>
    </template>

    <!-- SCRIPT -->

    <script type="module" src="./pages/index.js"></script>
  </body>
</html>
