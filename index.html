<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="pagina interactiva en la que los usuarios pueden eliminar, añadir o dar like a las fotos " />
    <meta name="author" content="Sofia Almeida" />
    <meta name="keywords" content="around, tripleten, HTML, CSS, javascript" />
    <title>Alrededor de los EE.UU. </title>
    <link rel="stylesheet" href="./pages/index.css" />
  </head>
  <body>
    <div class="page">
      <div class="popup" id="edit-profile-popup">
        <button type="button" class="popup__button popup__button_close"> x </button>
        <form class="form popup__container" name="edit-profile" novalidate>
          <h2 class="popup__subtitle">Editar perfil</h2>
         <fieldset class="popup__content">
          <input type="text" id="profile-name" class="popup__input form__input popup__input_name" placeholder="Nombre" required minlength="2" maxlength="40" data-error-required="El nombre es obligtorio" data-error-minlength="El nombre debe tener al menos dos caracteres"/>
          <span class="form__input-error"  id="profile-name-error"></span>

          <input type="text" id="profile-about" class="popup__input form__input popup__input_about" placeholder="Acerca de mi" required minlength="2" maxlength="200" data-error-required="El nombre es obligatorio" data-error-minlength="El nombre debe tener al menos dos caracteres"/>
          <span class="form__input-error" id="profile-about-error"></span>
         </fieldset>  
         <fieldset class="popup__content">
         </fieldset>

         <fieldset class="popup__content">
          <button type="submit"  class="popup__button popup__button_save form__save-button"> Guardar </button>
         </fieldset>
        </form>
      </div>  

       <div class="popup" id="add-place-popup">
        <button type="button" class="popup__button popup__button_close"> x </button>

        <form action class="form popup__container" id="add-place-form" novalidate>
          <h2 class="popup__subtitle">Nuevo lugar</h2>
          <fieldset class="popup__container">
            <input type="text" id="place-title" class="popup__input form__input popup__input_title"  placeholder="titulo" required minlength="2" maxlength="30"/>
            <span class="form__input-error" id="place-title-error"></span>

            <input type="url" id="place-link" class="popup__input form__input popup__input_imageURL"  placeholder="image URL" required />
            <span class="form__input-error" id="place-link-error"></span>
          </fieldset>
          
         <fieldset class="popup__content">
          <button type="submit" class="popup__button popup__button_save  form__save-button"> Guardar 

          </button>
         </fieldset>
        </form>
      </div> 

      <div class="popup popup_type_image">
        <div class="popup__type_image">
          <button class="popup__close-button" type="button"> X </button>
          <img class="popup__image" src="#" alt="#">
          <p class="popup__caption"></p>
        </div>
      </div>


      <header class="header">
            <img src="./images/Vector.svg" alt="logo-page" class="header__image">
      </header>
      <main class="main">
        <div class="main__profile">
          <div class="main__content-image">
           <img src="./images/image.jpg"
             alt="Jacques Cousteau"
             class="main__image"/>
          </div>
          <div class="main__content-paragraph">
          <p class="main__paragraph main__paragraph-title">
          Jacques Cousteau
          </p>
          <p class="main__paragraph main__paragraph-subtitle">Explorador</p>
          <button type="button" class="main__button main__button_edit"> 🖌 </button>
          </div>
          <button type="button" class="main__button main__button_add"> + </button>
        </div>
        <div class="main__gallery">
        
      </div>
      </main>

      <footer class="footer">
          <p class="footer__copyright">© 2024 Around The U.S.</p>
        </div>
      </footer>
    </div>
    <script src="scripts/index.js"></script>
  </body>
</html>
